<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ibrahim & María</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;600&family=El+Messiri:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay"></div>

<div class="intro" id="intro">
  <h2>💍 Wedding Invitation</h2>
  <p>Tap to Enter</p>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊</button>
<button id="langBtn">AR</button>

<div class="main" id="main">

  <div class="section">
    <h2 data-en="Wedding Invitation" data-ar="دعوة زفاف">
      Wedding Invitation
    </h2>

    <p data-en="With hearts full of love and joy,<br>we invite you to celebrate our wedding"
       data-ar="بقلوبٍ يملؤها الحب والفرح،<br>ندعوكم لمشاركتنا هذه اللحظة السعيدة">
      With hearts full of love and joy,<br>
      we invite you to celebrate our wedding
    </p>
  </div>

  <div class="section">
    <h1 data-en="Ibrahim <span>&</span> María"
        data-ar="إبراهيم <span>&</span> ماريا">
      Ibrahim <span>&</span> María
    </h1>
  </div>

  <div class="section">
    <p data-en="Tuesday" data-ar="الثلاثاء">Tuesday</p>

    <h2 data-en="July 14, 2026"
        data-ar="14 يوليو 2026">
      July 14, 2026
    </h2>

    <p data-en="05:00 PM"
       data-ar="05:00 مساءً">
      05:00 PM
    </p>
  </div>

  <div class="section">
    <p data-en="Sai Yacht"
       data-ar="ساي يخت">
      Sai Yacht
    </p>
  </div>

  <div class="section countdown">
    <div><span id="days">0</span><p>Days</p></div>
    <div><span id="hours">0</span><p>Hours</p></div>
    <div><span id="minutes">0</span><p>Minutes</p></div>
    <div><span id="seconds">0</span><p>Seconds</p></div>
  </div>

  <div class="section">
    <a href="https://maps.app.goo.gl/z8dyHBw3nUkpzJ2r6"
       target="_blank"
       class="map-btn"
       data-en="📍 Get Directions"
       data-ar="📍 عرض الموقع">
       📍 Get Directions
    </a>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
